<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MakerLab - Solicitar Máquina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        /* Cabeçalho de destaque */
        .hero-section { background: linear-gradient(135deg, #212529, #343a40); color: white; padding: 3rem 0; border-radius: 0 0 1.5rem 1.5rem; margin-bottom: 2.5rem; text-align: center;}
        .form-card { border-radius: 16px; border: none; }
    </style>
</head>
<body>

<div class="hero-section shadow">
    <div class="container">
        <h1 class="display-5 fw-bold">🚀 Portal MakerLab</h1>
        <p class="lead text-light">Transforme suas ideias em realidade. Reserve sua máquina abaixo.</p>
    </div>
</div>

<div class="container" style="max-width: 650px;">
    <div class="d-flex justify-content-end mb-3">
        <a href="/logout" class="btn btn-outline-danger btn-sm fw-bold">Sair do Sistema</a>
    </div>

    <div th:if="${param.sucesso}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        🎉 <strong>Tudo certo!</strong> Sua solicitação foi enviada para o técnico. Aguarde a aprovação.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow form-card bg-white mb-5">
        <div class="card-body p-4 p-md-5">
            <h4 class="mb-4 text-center fw-bold text-dark">Nova Solicitação de Uso</h4>

            <form th:action="@{/solicitar}" method="post">

                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary">Qual o seu nome completo?</label>
                    <input type="text" class="form-control form-control-lg bg-light" name="nomeUsuario" required placeholder="Ex: João Silva">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary">Qual máquina você precisa?</label>
                    <select class="form-select form-select-lg bg-light" name="maquina">
                        <option value="Impressora 3D">🖨️ Impressora 3D (Ender 3)</option>
                        <option value="Corte a Laser">🔥 Corte a Laser (MDF/Acrílico)</option>
                        <option value="Fresadora CNC">⚙️ Fresadora CNC</option>
                    </select>
                </div>

                <div class="mb-5">
                    <label class="form-label fw-bold text-secondary">Qual material será utilizado?</label>
                    <input type="text" class="form-control form-control-lg bg-light" name="material" required placeholder="Ex: Filamento PLA Branco (Aprox. 50g)">
                    <div class="form-text mt-2">Seja específico com as quantidades para facilitar a aprovação do técnico.</div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">Enviar Solicitação</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
