<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MakerLab - Solicitar Uso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">
    <h2 class="mb-4">🚀 Solicitar Máquina - MakerLab</h2>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/solicitar}" method="post">

                <div class="mb-3">
                    <label class="form-label">Seu Nome</label>
                    <input type="text" class="form-control" name="nomeUsuario" required placeholder="Ex: João Silva">
                </div>

                <div class="mb-3">
                    <label class="form-label">Máquina Desejada</label>
                    <select class="form-select" name="maquina">
                        <option value="Impressora 3D">Impressora 3D (Ender 3)</option>
                        <option value="Corte a Laser">Corte a Laser (MDF/Acrílico)</option>
                        <option value="Fresadora CNC">Fresadora CNC</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Material que será usado</label>
                    <input type="text" class="form-control" name="material" required placeholder="Ex: Filamento PLA Azul, 50g">
                </div>

                <button type="submit" class="btn btn-primary w-100">Enviar Solicitação</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
