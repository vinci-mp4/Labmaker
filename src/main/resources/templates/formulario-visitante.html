<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MakerLab - Solicitar Uso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">
    <h2 class="mb-4"> Solicitar Máquina - MakerLab</h2>

    <div th:if="${param.sucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
        ✅ <strong>Pronto!</strong> Sua solicitação foi enviada e está aguardando a aprovação do técnico.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/solicitar}" method="post">

                <div class="mb-3">
                    <label class="form-label">Seu Nome</label>
                    <input type="text" class="form-control" name="nomeUsuario" required placeholder="Ex: John Doe">
                </div>

                <div class="mb-3">
                    <label class="form-label">Máquina Desejada</label>
                    <select class="form-select" name="maquina">
                        <option value="Impressora FDM">Impressora FDM</option>
                        <option value="Impressora Resina">Impressora Resina</option>
                        <option value="Impressora de Pó">Impressora de Pó</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Material que será usado</label>
                    <input type="text" class="form-control" name="material" required placeholder="Ex: Filamento PLA Azul, 50g">
                </div>

                <button type="submit" class="btn btn-primary w-100">Enviar Solicitação</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
