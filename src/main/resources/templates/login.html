<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>MakerLab - Acesso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Centraliza tudo na tela e coloca uma cor de fundo suave */
    body { background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .login-card { width: 100%; max-width: 400px; padding: 2.5rem; border-radius: 16px; border: none; }
    .brand-icon { font-size: 3.5rem; text-align: center; margin-bottom: 1rem; }
  </style>
</head>
<body>

<div class="card shadow-lg login-card bg-white">
  <div class="brand-icon">🔬</div>
  <h3 class="text-center fw-bold mb-4 text-dark">MakerLab</h3>

  <div th:if="${param.error}" class="alert alert-danger text-center shadow-sm">
    Usuário ou senha incorretos.
  </div>

  <div th:if="${param.logout}" class="alert alert-success text-center shadow-sm">
    Você saiu do sistema com sucesso.
  </div>

  <form th:action="@{/login}" method="post">
    <div class="mb-3">
      <label class="form-label text-muted fw-bold">Usuário</label>
      <input type="text" name="username" class="form-control form-control-lg bg-light" required autofocus>
    </div>
    <div class="mb-4">
      <label class="form-label text-muted fw-bold">Senha</label>
      <input type="password" name="password" class="form-control form-control-lg bg-light" required>
    </div>
    <button type="submit" class="btn btn-dark btn-lg w-100 fw-bold shadow-sm">Entrar no Sistema</button>
  </form>
</div>

</body>
</html>
