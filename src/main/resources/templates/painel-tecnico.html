<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MakerLab - Painel Técnico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">MakerLab - Painel de Aprovação</h2>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Visitante</th>
                    <th>Máquina</th>
                    <th>Material</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="agendamento : ${agendamentos}">
                    <td th:text="${agendamento.id}">1</td>
                    <td th:text="${agendamento.nomeUsuario}">João</td>
                    <td th:text="${agendamento.maquina}">Impressora 3D</td>
                    <td th:text="${agendamento.material}">PLA Branco</td>
                    <td>
                        <span class="badge bg-warning text-dark" th:text="${agendamento.status}">PENDENTE</span>
                    </td>
                    <td>
                        <button class="btn btn-success btn-sm">Aprovar</button>
                        <button class="btn btn-danger btn-sm">Negar</button>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(agendamentos)}">
                    <td colspan="6" class="text-center text-muted">Nenhum agendamento pendente.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
